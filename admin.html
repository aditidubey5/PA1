<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Editor | People Assets Admin</title>
    <link rel="stylesheet" href="blog.css" />
    <style>
      .admin-container {
        max-width: 800px;
        margin: 60px auto;
        background: var(--white);
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        border: 1px solid var(--border-color);
      }
      .form-group {
        margin-bottom: 24px;
      }
      .form-group label {
        display: block;
        font-weight: 600;
        color: var(--slate-dark);
        margin-bottom: 8px;
        font-size: 0.95rem;
      }
      .form-control {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 1rem;
        font-family: inherit;
        color: var(--slate-dark);
        transition: border-color 0.2s ease;
      }
      .form-control:focus {
        outline: none;
        border-color: var(--brand-indigo);
        box-shadow: 0 0 0 3px var(--brand-indigo-light);
      }
      textarea.form-control {
        min-height: 150px;
        resize: vertical;
      }
      #content-editor {
        min-height: 300px;
      }
      .submit-btn {
        background-color: var(--brand-indigo);
        color: var(--white);
        border: none;
        padding: 14px 28px;
        font-size: 1.1rem;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
        transition: background-color 0.2s ease;
      }
      .submit-btn:hover {
        background-color: #4338ca;
      }
      #status-message {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        display: none;
        font-weight: 500;
        text-align: center;
      }
      .success {
        background: #dcfce7;
        color: #166534;
        border: 1px solid #bbf7d0;
      }
      .error {
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fecaca;
      }

      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
    </style>
  </head>
  <body style="background-color: var(--slate-light)">
    <div class="admin-container">
      <h1 style="margin-bottom: 30px; color: var(--slate-dark)">
        Admin Dashboard
      </h1>

      <!-- THE LOGIN SCREEN -->
      <div id="login-section">
        <h3 style="margin-bottom: 15px">Please log in to continue</h3>
        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            id="admin-email"
            class="form-control"
            placeholder="admin@peopleassets.in"
          />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="admin-password" class="form-control" />
        </div>
        <button id="login-btn" class="submit-btn" onclick="loginAdmin()">
          Log In
        </button>
        <div
          id="login-error"
          style="color: red; margin-top: 10px; display: none"
        ></div>
      </div>

      <!-- THE PUBLISHING FORM (Hidden by default) -->
      <form id="publish-form" style="display: none">
        <hr
          style="
            margin: 30px 0;
            border: none;
            border-top: 1px solid var(--border-color);
          "
        />
        <h3 style="margin-bottom: 20px">Publish New Insight</h3>

        <!-- KEEP YOUR EXISTING FORM FIELDS HERE -->
        <div class="form-group">
          <label for="title">Article Title</label>
          <input type="text" id="title" class="form-control" required />
        </div>
        <!-- ... rest of your inputs ... -->

        <button type="submit" class="submit-btn" id="submit-btn">
          Publish to Blog ✨
        </button>
      </form>

      <div id="status-message"></div>
    </div>

    <script src="js/supabase.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
