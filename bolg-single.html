<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reading Article | People Assets</title>
    <!-- We can reuse your existing blog.css for core styling -->
    <link rel="stylesheet" href="blog.css" />
    <style>
      /* Specific styling for the reading layout */
      .article-header {
        max-width: 800px;
        margin: 60px auto 30px auto;
        text-align: center;
      }
      .article-cover-image {
        width: 100%;
        max-width: 1000px;
        height: 450px;
        margin: 0 auto 40px auto;
        border-radius: 16px;
        overflow: hidden;
      }
      .article-body {
        max-width: 720px;
        margin: 0 auto 80px auto;
        font-size: 1.125rem;
        line-height: 1.8;
        color: var(--slate-dark);
      }
      .article-body h3 {
        margin-top: 40px;
        margin-bottom: 15px;
        color: var(--brand-indigo);
      }
      .back-link {
        display: inline-block;
        margin-top: 40px;
        color: var(--slate-gray);
        text-decoration: none;
        font-weight: 600;
      }
      .back-link:hover {
        color: var(--brand-indigo);
      }

      /* Loading State */
      #loading-state {
        text-align: center;
        padding: 100px 20px;
        font-size: 1.2rem;
        color: var(--slate-gray);
      }
    </style>
  </head>
  <body>
    <main class="container">
      <!-- Back Navigation -->
      <a href="/blog.html" class="back-link">← Back to All Articles</a>

      <!-- The Loading Indicator -->
      <div id="loading-state">✨ Fetching your article...</div>

      <!-- The Content Wrapper (Hidden until JS populates it) -->
      <article id="article-content" style="display: none">
        <header class="article-header">
          <span class="post-category" id="render-category">Category</span>
          <h1 id="render-title" style="font-size: 2.5rem; margin: 15px 0">
            Article Title
          </h1>
          <div
            class="post-meta"
            style="justify-content: center; font-size: 1rem"
          >
            <span id="render-date">Date</span>
            <span class="meta-divider">•</span>
            <span id="render-read-time">0 min read</span>
          </div>
        </header>

        <div class="article-cover-image">
          <img id="render-image" src="" alt="Article Cover" />
        </div>

        <div class="article-body" id="render-body">
          <!-- Main text content goes here -->
        </div>
      </article>
    </main>

    <!-- Supabase & Controller Scripts -->
    <script src="js/supabase.js"></script>
    <script src="js/blog-single.js"></script>
  </body>
</html>
